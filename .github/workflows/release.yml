# ---------------------------------------------------------------------------
# Release — semantic-release on every push to main (and dev pre-releases
# from dev). Conventional commits drive the version bump, changelog, tag,
# GitHub release with assets, and the automatic backmerge main → dev.
# Same design as LazyGimp's pipeline.
#   - main → release stabile (vX.Y.Z), marcata Latest su GitHub
#   - dev  → prerelease (vX.Y.Z-dev.N), marcata Pre-release, mai Latest
# ---------------------------------------------------------------------------
name: Release

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install asset build prerequisites
        run: |
          sudo apt-get update -q && sudo apt-get install -y python3-tk zip
          pip install pyinstaller pillow

      - name: Install release tooling
        run: npm install --no-audit --no-fund

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
