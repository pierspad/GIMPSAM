# ---------------------------------------------------------------------------
# Release (semantic-release) — stesso design di vesta/LazyGimp.
#
# Ogni push su main/dev analizza i conventional commits (feat → minor,
# fix/perf/refactor → patch, feat!/BREAKING CHANGE → major):
#   - main → release stabile (vX.Y.Z), marcata Latest su GitHub
#   - dev  → prerelease (vX.Y.Z-dev.N), marcata Pre-release, mai Latest
#
# La release include lo zip del plugin GIMP 3 buildato in prepareCmd
# (vedi .releaserc). Niente più tag manuali.
# ---------------------------------------------------------------------------
name: Release (semantic-release)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Release via semantic-release
        uses: cycjimmy/semantic-release-action@v5
        id: release
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
